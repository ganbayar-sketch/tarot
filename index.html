<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System ICOT QR</title>
    <meta
      name="description"
      content="A minimal QR card that opens System ICOT."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="qr-card" aria-labelledby="qr-title">
        <p class="eyebrow">System ICOT</p>
        <h1 id="qr-title">Scan to open the site</h1>
        <p class="subtitle">Minimal QR card for quick access to systemicot.vercel.app</p>

        <div class="qr-frame">
          <img
            class="qr-image"
            src="./assets/systemicot-qr.png"
            alt="QR code linking to systemicot.vercel.app"
          />
        </div>

        <a class="qr-link" href="https://systemicot.vercel.app">
          systemicot.vercel.app
        </a>
      </section>
    </main>
  </body>
</html>
